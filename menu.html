<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Menu - Olive Garden Delight</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Olive Garden Delight</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html" class="active">Menu</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="cart.html" class="cart-icon"><i class="fas fa-shopping-cart"></i><span id="cart-count">0</span></a></li>
        </ul>
        <div class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    </nav>

    <div class="container">
        <h1 class="section-title">Explore Our Menu</h1>
        
        <div class="controls">
            <div class="filter-btns">
                <button class="btn active" onclick="filterMenu('all')">All</button>
                <button class="btn" onclick="filterMenu('veg')">Veg</button>
                <button class="btn" onclick="filterMenu('non-veg')">Non-Veg</button>
                <button class="btn" onclick="filterMenu('drinks')">Drinks</button>
                <button class="btn" onclick="filterMenu('desserts')">Desserts</button>
            </div>
            <input type="text" id="search-bar" placeholder="Search food..." onkeyup="searchMenu()">
        </div>

        <div class="menu-grid" id="menu-grid"></div>
    </div>

    <div id="toast"></div>
    <script type="module" src="script.js"></script>
</body>
</html>
